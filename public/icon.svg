<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    :root {
      --bg-color: #ffffff;
      --border-color: #e5e5e5;
      --text-color: #171717;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0d0d0d;
        --border-color: #262626;
        --text-color: #ffffff;
      }
    }
    rect { fill: var(--bg-color); stroke: var(--border-color); }
    text { fill: var(--text-color); }
  </style>
  <rect x="2" y="2" width="60" height="60" rx="16" stroke-width="2"/>
  <text x="32" y="41" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="700" text-anchor="middle" letter-spacing="-1">SA</text>
</svg>
